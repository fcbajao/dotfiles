[tasks.link-dotfiles]
description = "Create config dirs and symlink dotfiles"
run = """
  echo "Linking config files..."
  mkdir -p ~/.config/nvim
  mkdir -p ~/.config/zsh
  mkdir -p ~/.config/mise

  ln -sf ~/dotfiles/.zshrc                                ~/.zshrc
  ln -sf ~/dotfiles/.gitconfig                            ~/.gitconfig
  ln -sf ~/dotfiles/.gitignore_global                     ~/.gitignore_global
  ln -sf ~/dotfiles/mise-config.toml                      ~/.config/mise/config.toml
  ln -sf ~/dotfiles/init.vim                              ~/.config/nvim/init.vim
  ln -sf ~/dotfiles/zsh_plugins.txt                       ~/.config/zsh/zsh_plugins.txt
  ln -sf ~/dotfiles/.tmux.conf                            ~/.tmux.conf
"""

[tasks.setup-gnome-alacritty-toggle]
description = "Install local GNOME Alacritty toggle extension"
run = """
  mkdir -p ~/.local/share/gnome-shell/extensions
  ln -sfn ~/dotfiles/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local \
    ~/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local

  glib-compile-schemas \
    ~/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local/schemas

  gsettings --schemadir ~/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local/schemas \
    set org.gnome.shell.extensions.alacritty-toggle toggle-key "['<Control>grave']"
  gsettings --schemadir ~/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local/schemas \
    set org.gnome.shell.extensions.alacritty-toggle command "$HOME/.cargo/bin/alacritty"
  gsettings --schemadir ~/.local/share/gnome-shell/extensions/alacritty-toggle@dotfiles.local/schemas \
    set org.gnome.shell.extensions.alacritty-toggle app-id "Alacritty.desktop"

  # Enable in current profile; if this fails, log out/in and enable from Extensions app.
  python3 - <<'PY'
import ast, subprocess
uuid = 'alacritty-toggle@dotfiles.local'
current = subprocess.check_output(
    ['gsettings', 'get', 'org.gnome.shell', 'enabled-extensions'], text=True
).strip()
exts = ast.literal_eval(current)
if uuid not in exts:
    exts.append(uuid)
    value = '[' + ', '.join(f"'{e}'" for e in exts) + ']'
    subprocess.check_call(['gsettings', 'set', 'org.gnome.shell', 'enabled-extensions', value])
print('enabled-extensions updated')
PY
"""

[tasks.install-alacritty-ubuntu]
description = "Install Alacritty in Ubuntu"
run = """
  sudo apt install -y cmake g++ pkg-config libfontconfig1-dev libxcb-xfixes0-dev libxkbcommon-dev python3
  git clone https://github.com/alacritty/alacritty.git ~/alacritty
  cd ~/alacritty
  cargo install --path alacritty

  mkdir -p ~/.config/alacritty
  ln -sf ~/dotfiles/alacritty.toml ~/.config/alacritty/alacritty.toml
"""

[tasks.install-antidote]
description = "Install Antidote"
run = """
  git clone --depth=1 https://github.com/mattmc3/antidote.git ~/.antidote
"""

[tasks.install-vim-plug]
description = "Install vim-plug for Neovim"
run = """
  curl -fsSL -o ~/.local/share/nvim/site/autoload/plug.vim --create-dirs \
    https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
"""

# ------------------------------------------------------------
# macOS bootstrap
# ------------------------------------------------------------
[tasks.bootstrap-mac]
description = "macOS: install CLI deps via Homebrew, mise install, link dotfiles"
run = """
  set -e
  echo "[macOS] Installing CLI packages via Homebrew..."
  brew update
  brew install fzf the_silver_searcher tmux

  # Optional GUI apps (cannot be installed by mise):
  brew install --cask phoenix

  mise run link-dotfiles

  echo "[macOS] Running mise install..."
  mise install

  mise run install-antidote
  mise run install-vim-plug

  mkdir -p ~/.config/alacritty
  ln -sf ~/dotfiles/.config/alacritty/alacritty.yml       ~/.config/alacritty/alacritty.yml
  ln -sf ~/dotfiles/.phoenix.js                           ~/.phoenix.js  # macOS only; harmless on Linux

  echo "[macOS] Done."
"""

[tasks.install-alacritty-fedora]
description = "Install Alacritty in Fedora"
run = """
  sudo dnf install -y cmake g++ pkg-config fontconfig-devel libxkbcommon-devel python3
  git clone https://github.com/alacritty/alacritty.git ~/alacritty
  cd ~/alacritty
  cargo install --path alacritty

  mkdir -p ~/.config/alacritty
  ln -sf ~/dotfiles/alacritty.toml ~/.config/alacritty/alacritty.toml
"""

# ------------------------------------------------------------
# Fedora bootstrap
# ------------------------------------------------------------
[tasks.bootstrap-fedora]
description = "Fedora/RHEL: install CLI deps via dnf, mise install, link dotfiles"
env = { RUBY_BUILD_BUILD_OPENSSL = "0", RUBY_CONFIGURE_OPTS = "--with-openssl-dir=/usr" }
run = """
  set -e
  echo "[Fedora] Installing CLI packages via dnf..."
  sudo dnf install -y fzf the_silver_searcher tmux \
    gcc make perl pkg-config autoconf bison \
    openssl-devel zlib-devel readline-devel libyaml-devel libffi-devel \
    gdbm-devel ncurses-devel @development-tools

  mise run link-dotfiles

  echo "[Fedora] Running mise install..."
  mise install

  mise run install-antidote
  mise run install-vim-plug
  mise run install-alacritty-fedora
  mise run setup-gnome-alacritty-toggle

  echo "[Fedora] Done."
"""

# ------------------------------------------------------------
# Ubuntu/Debian bootstrap
# ------------------------------------------------------------
[tasks.bootstrap-ubuntu]
description = "Ubuntu/Debian: install CLI deps via apt, mise install, link dotfiles"
env = { RUBY_BUILD_BUILD_OPENSSL = "0", RUBY_CONFIGURE_OPTS = "--with-openssl-dir=/usr" }
run = """
  set -e
  echo "[Ubuntu] Installing CLI packages via apt..."
  sudo apt-get update
  sudo apt-get install -y fzf silversearcher-ag tmux \
  build-essential gcc make perl pkg-config autoconf bison \
  libssl-dev zlib1g-dev libreadline-dev libyaml-dev libffi-dev \
  libgdbm-dev libgdbm-compat-dev libncurses-dev

  mise run link-dotfiles

  echo "[Ubuntu] Running mise install..."
  mise install

  mise run install-antidote
  mise run install-vim-plug
  mise run install-alacritty-ubuntu
  mise run setup-gnome-alacritty-toggle

  echo "[Ubuntu] Done."
"""
